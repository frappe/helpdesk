name: Build Frappe Image
on:
  push:
    branches:
      - develop

  repository_dispatch:
    types: [trigger_build]
  workflow_dispatch:

env:
  AWS_REGION: eu-west-2
  IMAGE_NAME: support-uat
  FRAPPE_REPO: https://github.com/frappe/frappe
  FRAPPE_VERSION: version-15
  PY_VERSION: "3.14.2"
  NODEJS_VERSION: "22.13.0"
  DOCKERFILE: images/custom/Containerfile

jobs:
  trigger-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout app repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GIT_TOKEN }}
          fetch-depth: 0

      - name: Generate version
        id: version
        run: |
          PREV_VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.11")
          PREV_VERSION=${PREV_VERSION#v}
          MAJOR=$(echo $PREV_VERSION | cut -d. -f1)
          MINOR=$(echo $PREV_VERSION | cut -d. -f2)
          PATCH=$(echo $PREV_VERSION | cut -d. -f3)
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"

          while git rev-parse "refs/tags/v$NEW_VERSION" >/dev/null 2>&1; do
            PATCH=$((PATCH + 1))
            NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          done

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $NEW_VERSION"

      - name: Determine apps branch
        id: apps-branch
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]] || [[ "${{ github.ref }}" == "refs/heads/master" ]]; then
            echo "branch=master" >> $GITHUB_OUTPUT
          else
            echo "branch=develop" >> $GITHUB_OUTPUT
          fi

      - name: Generate apps.json
        id: apps-json
        env:
          GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
        run: |
          APPS_BRANCH="${{ steps.apps-branch.outputs.branch }}"

          cat > apps.json <<EOF
          [
            {
              "url": "https://github.com/frappe/erpnext",
              "branch": "version-15"
            },
            {
              "url": "https://github.com/frappe/payments",
              "branch": "version-15"
            },
            {
              "url": "https://github.com/frappe/hrms",
              "branch": "version-15"
            },
            {
              "url": "https://github.com/frappe/telephony",
              "branch": "develop"
            },
            {
              "url": "https://mwogi:${GIT_TOKEN}@github.com/tiberbu/helpdesk.git",
              "branch": "develop"
            }
          ]
          EOF

          APPS_JSON_BASE64=$(base64 -w 0 apps.json)
          echo "apps_json_base64=$APPS_JSON_BASE64" >> $GITHUB_OUTPUT

      - name: Trigger build in custom_containers_uat repo
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GIT_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/tiberbu/custom_containers_uat/actions/workflows/build.yaml/dispatches \
            -d '{
              "ref": "main",
              "inputs": {
                "image": "${{ env.IMAGE_NAME }}",
                "version": "${{ steps.version.outputs.version }}",
                "frappe-repo": "${{ env.FRAPPE_REPO }}",
                "frappe-version": "${{ env.FRAPPE_VERSION }}",
                "py-version": "${{ env.PY_VERSION }}",
                "nodejs-version": "${{ env.NODEJS_VERSION }}",
                "apps-json-base64": "${{ steps.apps-json.outputs.apps_json_base64 }}",
                "dockerfile": "${{ env.DOCKERFILE }}"
              }
            }'

          echo "Workflow dispatch sent: ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}"

      - name: Create and push git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="v${{ steps.version.outputs.version }}"
          git tag "$TAG"
          git push origin "$TAG"
          echo "Created and pushed tag: $TAG"

      - name: Trigger Summary
        run: |
          echo "## Build Triggered" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Target Repo:** \`tiberbu/custom_containers_uat\`" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Apps Branch:** \`${{ steps.apps-branch.outputs.branch }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Monitor build progress in: https://github.com/tiberbu/custom_containers_uat/actions" >> $GITHUB_STEP_SUMMARY